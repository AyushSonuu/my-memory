<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ingestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e65100" />
      <stop offset="100%" style="stop-color:#bf360c" />
    </linearGradient>
    <linearGradient id="compileGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f57c00" />
      <stop offset="100%" style="stop-color:#e65100" />
    </linearGradient>
    <linearGradient id="kbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1565c0" />
      <stop offset="100%" style="stop-color:#0d47a1" />
    </linearGradient>
    <linearGradient id="readGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32" />
      <stop offset="100%" style="stop-color:#1b5e20" />
    </linearGradient>
    <linearGradient id="futureGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a1b9a" />
      <stop offset="100%" style="stop-color:#4a148c" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700" letter-spacing="0.5">🧠 My Memory — Architecture</text>
  <text x="500" y="56" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="0.3">AI-maintained learning vault &amp; knowledge base · Inspired by Karpathy's LLM Wiki</text>

  <!-- ═══ COLUMN 1: INGEST ═══ -->
  <text x="145" y="86" text-anchor="middle" fill="#ff9800" font-size="13" font-weight="700" letter-spacing="1">📥 INGEST</text>
  
  <!-- Raw Sources -->
  <rect x="30" y="98" width="230" height="34" rx="8" fill="url(#ingestGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="145" y="120" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🎬 Video Transcripts</text>
  
  <rect x="30" y="140" width="230" height="34" rx="8" fill="url(#ingestGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="145" y="162" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📰 Articles · URLs · Tweets</text>
  
  <rect x="30" y="182" width="230" height="34" rx="8" fill="url(#ingestGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="145" y="204" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">📦 PDFs · Slides · Code</text>

  <!-- Agent Box -->
  <rect x="45" y="236" width="200" height="60" rx="12" fill="url(#compileGrad)" filter="url(#shadow)"/>
  <text x="145" y="261" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">🤖 Ayra</text>
  <text x="145" y="280" text-anchor="middle" fill="#ffe0b2" font-size="10">AI Agent · OpenClaw runtime</text>

  <!-- Arrows from sources to agent -->
  <path d="M145 132 L145 236" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  <path d="M145 174 L145 236" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  <path d="M145 216 L145 236" stroke="#ff9800" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- Schema box -->
  <rect x="45" y="310" width="200" height="42" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="145" y="330" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">⚙️ AGENTS.md + SOUL.md</text>
  <text x="145" y="344" text-anchor="middle" fill="#6e7681" font-size="9">schema · rules · templates</text>

  <!-- Arrow agent to schema -->
  <path d="M145 296 L145 310" stroke="#6e7681" stroke-width="1" stroke-dasharray="3,3" fill="none"/>
  <text x="158" y="306" fill="#6e7681" font-size="8">follows</text>

  <!-- ═══ BIG ARROW: INGEST → KB ═══ -->
  <path d="M260 266 L370 266" stroke="#ff9800" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <defs><marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ff9800"/></marker></defs>
  <text x="315" y="258" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="600">compiles</text>

  <!-- ═══ COLUMN 2: KNOWLEDGE BASE ═══ -->
  <text x="530" y="86" text-anchor="middle" fill="#42a5f5" font-size="13" font-weight="700" letter-spacing="1">📝 KNOWLEDGE BASE</text>

  <rect x="370" y="98" width="320" height="256" rx="12" fill="#0d1117" stroke="#1565c0" stroke-width="1.5" opacity="0.8"/>
  
  <!-- KB items -->
  <rect x="385" y="110" width="145" height="50" rx="8" fill="url(#kbGrad)" filter="url(#shadow)"/>
  <text x="457" y="132" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">📄 Lesson Notes</text>
  <text x="457" y="148" text-anchor="middle" fill="#bbdefb" font-size="9">visual-first · numbered</text>
  
  <rect x="540" y="110" width="140" height="50" rx="8" fill="url(#kbGrad)" filter="url(#shadow)"/>
  <text x="610" y="132" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🗺️ Knowledge Maps</text>
  <text x="610" y="148" text-anchor="middle" fill="#bbdefb" font-size="9">connections · weak spots</text>
  
  <rect x="385" y="170" width="145" height="50" rx="8" fill="url(#kbGrad)" filter="url(#shadow)"/>
  <text x="457" y="192" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🃏 Flashcards</text>
  <text x="457" y="208" text-anchor="middle" fill="#bbdefb" font-size="9">cross-topic pulls</text>
  
  <rect x="540" y="170" width="140" height="50" rx="8" fill="url(#kbGrad)" filter="url(#shadow)"/>
  <text x="610" y="192" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">🔗 Cross-References</text>
  <text x="610" y="208" text-anchor="middle" fill="#bbdefb" font-size="9">READMEs · ⚡ markers</text>
  
  <rect x="385" y="230" width="145" height="50" rx="8" fill="url(#kbGrad)" filter="url(#shadow)"/>
  <text x="457" y="252" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">📋 Cheatsheets</text>
  <text x="457" y="268" text-anchor="middle" fill="#bbdefb" font-size="9">one-page summaries</text>

  <rect x="540" y="230" width="140" height="50" rx="8" fill="url(#kbGrad)" filter="url(#shadow)"/>
  <text x="610" y="252" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">⚔️ Comparisons</text>
  <text x="610" y="268" text-anchor="middle" fill="#bbdefb" font-size="9">vs.md files</text>

  <!-- Sync badges -->
  <rect x="395" y="295" width="90" height="22" rx="11" fill="#1b5e20" opacity="0.8"/>
  <text x="440" y="310" text-anchor="middle" fill="#a5d6a7" font-size="9" font-weight="600">⚡ Tier 1</text>
  
  <rect x="495" y="295" width="90" height="22" rx="11" fill="#e65100" opacity="0.8"/>
  <text x="540" y="310" text-anchor="middle" fill="#ffcc80" font-size="9" font-weight="600">🗺️ Tier 2</text>
  
  <rect x="595" y="295" width="90" height="22" rx="11" fill="#6a1b9a" opacity="0.8"/>
  <text x="640" y="310" text-anchor="middle" fill="#ce93d8" font-size="9" font-weight="600">🧹 Tier 3</text>

  <!-- ═══ BIG ARROW: KB → READ ═══ -->
  <path d="M690 200 L745 200" stroke="#42a5f5" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#42a5f5"/></marker></defs>

  <!-- ═══ COLUMN 3: READ / QUERY ═══ -->
  <text x="860" y="86" text-anchor="middle" fill="#66bb6a" font-size="13" font-weight="700" letter-spacing="1">👁️ READ · QUERY · REVISE</text>

  <rect x="750" y="98" width="220" height="42" rx="8" fill="url(#readGrad)" filter="url(#shadow)"/>
  <text x="860" y="118" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🌐 MkDocs Material Site</text>
  <text x="860" y="132" text-anchor="middle" fill="#c8e6c9" font-size="9">search · dark mode · Mermaid</text>

  <rect x="750" y="150" width="220" height="42" rx="8" fill="url(#readGrad)" filter="url(#shadow)"/>
  <text x="860" y="170" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🔄 Spaced Repetition</text>
  <text x="860" y="184" text-anchor="middle" fill="#c8e6c9" font-size="9">Day 1 → 3 → 7 → 14 → 30 → 90</text>

  <rect x="750" y="202" width="220" height="42" rx="8" fill="url(#readGrad)" filter="url(#shadow)"/>
  <text x="860" y="222" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">💬 Chat Q&amp;A</text>
  <text x="860" y="236" text-anchor="middle" fill="#c8e6c9" font-size="9">answers filed back into vault</text>

  <rect x="750" y="254" width="220" height="42" rx="8" fill="url(#readGrad)" filter="url(#shadow)"/>
  <text x="860" y="274" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">🧹 Monthly Lint</text>
  <text x="860" y="288" text-anchor="middle" fill="#c8e6c9" font-size="9">contradictions · orphans · drift</text>

  <!-- ═══ FEEDBACK LOOPS ═══ -->
  <!-- Q&A files back -->
  <path d="M860 244 C860 370, 530 385, 530 354" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowGreen)" opacity="0.7"/>
  <defs><marker id="arrowGreen" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#66bb6a"/></marker></defs>
  <rect x="645" y="368" width="120" height="18" rx="9" fill="#1b5e20" opacity="0.7"/>
  <text x="705" y="380" text-anchor="middle" fill="#a5d6a7" font-size="8" font-weight="600">🔁 file back into vault</text>

  <!-- Lint enhances -->
  <path d="M860 296 C860 400, 430 410, 430 354" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowPurple)" opacity="0.6"/>
  <defs><marker id="arrowPurple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><path d="M0,0 L7,2.5 L0,5" fill="#ce93d8"/></marker></defs>
  <rect x="460" y="398" width="110" height="18" rx="9" fill="#4a148c" opacity="0.7"/>
  <text x="515" y="410" text-anchor="middle" fill="#ce93d8" font-size="8" font-weight="600">🧹 lint → enhance</text>

  <!-- ═══ FUTURE: RAG CHATBOT ═══ -->
  <rect x="750" y="310" width="220" height="42" rx="8" fill="url(#futureGrad)" filter="url(#shadow)"/>
  <text x="860" y="330" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🚀 RAG Chatbot</text>
  <text x="860" y="344" text-anchor="middle" fill="#e1bee7" font-size="9">query your own compiled knowledge</text>
  
  <!-- ═══ BOTTOM: PHASE PIPELINE ═══ -->
  <rect x="30" y="435" width="940" height="60" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  
  <rect x="50" y="447" width="160" height="36" rx="8" fill="#e65100" opacity="0.9"/>
  <text x="130" y="470" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">📥 Phase 1 · Ingest</text>
  
  <path d="M215 465 L235 465" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="225" y="460" fill="#fff" font-size="10" opacity="0.5">→</text>
  
  <rect x="240" y="447" width="170" height="36" rx="8" fill="#1565c0" opacity="0.9"/>
  <text x="325" y="470" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">📝 Phase 2 · Compile</text>
  
  <path d="M415 465 L435 465" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="425" y="460" fill="#fff" font-size="10" opacity="0.5">→</text>
  
  <rect x="440" y="447" width="190" height="36" rx="8" fill="#2e7d32" opacity="0.9"/>
  <text x="535" y="470" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">👁️ Phase 3 · Query &amp; Revise</text>
  
  <path d="M635 465 L655 465" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="645" y="460" fill="#fff" font-size="10" opacity="0.5">→</text>
  
  <rect x="660" y="447" width="155" height="36" rx="8" fill="#6a1b9a" opacity="0.9"/>
  <text x="737" y="470" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">🧹 Phase 4 · Lint</text>
  
  <path d="M820 465 L840 465" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="830" y="460" fill="#fff" font-size="10" opacity="0.5">→</text>
  
  <rect x="845" y="447" width="110" height="36" rx="8" fill="#37474f" stroke="#6a1b9a" stroke-width="1" opacity="0.9"/>
  <text x="900" y="470" text-anchor="middle" fill="#ce93d8" font-size="11" font-weight="700">🚀 Chatbot</text>
  
  <!-- Cycle arrow in phase bar -->
  <path d="M737 483 C737 505, 130 505, 130 483" stroke="#8b949e" stroke-width="1" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowGrey)" opacity="0.5"/>
  <defs><marker id="arrowGrey" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#8b949e"/></marker></defs>
  <text x="430" y="510" text-anchor="middle" fill="#6e7681" font-size="8" font-style="italic">cycle — always adding up</text>

  <!-- Footer -->
  <text x="500" y="510" text-anchor="middle" fill="#30363d" font-size="0">.</text>
</svg>
