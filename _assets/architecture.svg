<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117" />
      <stop offset="100%" style="stop-color:#161b22" />
    </linearGradient>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" rx="16" fill="url(#bg)"/>

  <!-- ═══ TITLE ═══ -->
  <text x="40" y="46" fill="#ffffff" font-size="28" font-weight="800" letter-spacing="0.5">🧠 My Memory</text>
  <text x="40" y="72" fill="#8b949e" font-size="14">Learning Vault + Personal Knowledge Base — built &amp; maintained by an AI agent</text>
  <text x="40" y="92" fill="#6e7681" font-size="11" font-style="italic">Inspired by Andrej Karpathy's LLM Wiki pattern</text>

  <!-- ═══ COLUMN HEADERS ═══ -->
  <text x="165" y="128" text-anchor="middle" fill="#ff9800" font-size="14" font-weight="700" letter-spacing="2">INGEST</text>
  <text x="620" y="128" text-anchor="middle" fill="#42a5f5" font-size="14" font-weight="700" letter-spacing="2">KNOWLEDGE BASE</text>
  <text x="1040" y="128" text-anchor="middle" fill="#66bb6a" font-size="14" font-weight="700" letter-spacing="2">READ / QUERY</text>

  <!-- ═══ KB CONTAINER ═══ -->
  <rect x="400" y="140" width="440" height="340" rx="12" fill="none" stroke="#30363d" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="160" text-anchor="middle" fill="#484f58" font-size="10" letter-spacing="0.5">vault/ — .md directory structure</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ═══ COLUMN 1: INGEST                   ═══ -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Video Transcripts -->
  <rect x="40" y="155" width="250" height="52" rx="10" fill="#e65100" filter="url(#sh)"/>
  <text x="165" y="178" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🎬 Video Transcripts</text>
  <text x="165" y="196" text-anchor="middle" fill="#ffcc80" font-size="10">Course lectures → .md transcripts</text>

  <!-- Articles & URLs -->
  <rect x="40" y="222" width="250" height="52" rx="10" fill="#ef6c00" filter="url(#sh)"/>
  <text x="165" y="245" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">📰 Articles · URLs · Tweets</text>
  <text x="165" y="263" text-anchor="middle" fill="#ffe0b2" font-size="10">KB ingest — batchable, lighter</text>

  <!-- PDFs & Code -->
  <rect x="40" y="289" width="250" height="52" rx="10" fill="#4caf50" filter="url(#sh)"/>
  <text x="165" y="312" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">📦 PDFs · Slides · Code</text>
  <text x="165" y="330" text-anchor="middle" fill="#c8e6c9" font-size="10">course_material/ + code/ notebooks</text>

  <!-- Schema -->
  <rect x="40" y="360" width="250" height="52" rx="10" fill="#455a64" filter="url(#sh)"/>
  <text x="165" y="383" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">⚙️ AGENTS.md + SOUL.md</text>
  <text x="165" y="401" text-anchor="middle" fill="#b0bec5" font-size="10">Schema · rules · _templates/</text>

  <!-- AI Agent -->
  <rect x="60" y="432" width="210" height="60" rx="12" fill="#f57c00" filter="url(#sh)"/>
  <text x="165" y="458" text-anchor="middle" fill="#fff" font-size="15" font-weight="800">🤖 Ayra</text>
  <text x="165" y="478" text-anchor="middle" fill="#ffe0b2" font-size="10">OpenClaw runtime · raw → structured vault</text>

  <!-- Arrows from sources to agent -->
  <line x1="165" y1="207" x2="165" y2="222" stroke="#ff9800" stroke-width="1.5" opacity="0.4"/>
  <line x1="165" y1="274" x2="165" y2="289" stroke="#ff9800" stroke-width="1.5" opacity="0.4"/>
  <line x1="165" y1="341" x2="165" y2="360" stroke="#ff9800" stroke-width="1.5" opacity="0.4"/>
  <line x1="165" y1="412" x2="165" y2="432" stroke="#b0bec5" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- "follows" label -->
  <text x="180" y="426" fill="#6e7681" font-size="9" font-style="italic">follows</text>

  <!-- ═══ COMPILE ARROW ═══ -->
  <line x1="270" y1="462" x2="390" y2="462" stroke="#ff9800" stroke-width="2"/>
  <polygon points="390,457 400,462 390,467" fill="#ff9800"/>
  <text x="335" y="453" text-anchor="middle" fill="#ff9800" font-size="10" font-style="italic">compiles</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ═══ COLUMN 2: KNOWLEDGE BASE           ═══ -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- Maps & READMEs -->
  <rect x="420" y="172" width="200" height="56" rx="8" fill="#1565c0" filter="url(#sh)"/>
  <text x="520" y="196" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🗺️ _maps/ &amp; READMEs</text>
  <text x="520" y="214" text-anchor="middle" fill="#bbdefb" font-size="9">Auto-maintained — always consulted first</text>

  <!-- Lesson Notes -->
  <rect x="420" y="240" width="200" height="56" rx="8" fill="#1976d2" filter="url(#sh)"/>
  <text x="520" y="264" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📄 Lesson Notes (*.md)</text>
  <text x="520" y="282" text-anchor="middle" fill="#bbdefb" font-size="9">45 lessons, visual-first, numbered</text>

  <!-- Flashcards & Cheatsheets -->
  <rect x="420" y="308" width="200" height="56" rx="8" fill="#7b1fa2" filter="url(#sh)"/>
  <text x="520" y="332" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🃏 Flashcards &amp; Cheatsheets</text>
  <text x="520" y="350" text-anchor="middle" fill="#e1bee7" font-size="9">Cross-topic pulls, spaced repetition</text>

  <!-- Cross-References -->
  <rect x="420" y="376" width="200" height="56" rx="8" fill="#c62828" filter="url(#sh)"/>
  <text x="520" y="400" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🔗 Cross-Refs &amp; Connections</text>
  <text x="520" y="418" text-anchor="middle" fill="#ffcdd2" font-size="9">Auto-generated link graph, ⚡ markers</text>

  <!-- vs.md & Comparisons -->
  <rect x="630" y="172" width="195" height="56" rx="8" fill="#00695c" filter="url(#sh)"/>
  <text x="727" y="196" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">⚔️ Comparisons (vs.md)</text>
  <text x="727" y="214" text-anchor="middle" fill="#b2dfdb" font-size="9">Side-by-side topic analysis</text>

  <!-- Memory Fragments -->
  <rect x="630" y="240" width="195" height="56" rx="8" fill="#4e342e" filter="url(#sh)"/>
  <text x="727" y="264" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">💡 Memory Fragments</text>
  <text x="727" y="282" text-anchor="middle" fill="#d7ccc8" font-size="9">TILs, insights, quick KB entries</text>

  <!-- Revision Tracker -->
  <rect x="630" y="308" width="195" height="56" rx="8" fill="#827717" filter="url(#sh)"/>
  <text x="727" y="332" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📅 Revision Tracker</text>
  <text x="727" y="350" text-anchor="middle" fill="#f0f4c3" font-size="9">tracker.json + due-today.md</text>

  <!-- Derived Outputs -->
  <rect x="630" y="376" width="195" height="56" rx="8" fill="#37474f" filter="url(#sh)"/>
  <text x="727" y="400" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">📝 Filed Query Answers</text>
  <text x="727" y="418" text-anchor="middle" fill="#b0bec5" font-size="9">Chat synthesis → vault pages</text>

  <!-- Sync tier badges -->
  <rect x="435" y="445" width="75" height="22" rx="11" fill="#1b5e20"/>
  <text x="472" y="460" text-anchor="middle" fill="#a5d6a7" font-size="9" font-weight="700">⚡ Tier 1</text>
  <text x="472" y="475" text-anchor="middle" fill="#6e7681" font-size="8">every edit</text>
  
  <rect x="535" y="445" width="75" height="22" rx="11" fill="#e65100"/>
  <text x="572" y="460" text-anchor="middle" fill="#ffcc80" font-size="9" font-weight="700">🗺️ Tier 2</text>
  <text x="572" y="475" text-anchor="middle" fill="#6e7681" font-size="8">end of session</text>
  
  <rect x="635" y="445" width="75" height="22" rx="11" fill="#6a1b9a"/>
  <text x="672" y="460" text-anchor="middle" fill="#ce93d8" font-size="9" font-weight="700">🧹 Tier 3</text>
  <text x="672" y="475" text-anchor="middle" fill="#6e7681" font-size="8">monthly lint</text>

  <rect x="735" y="445" width="90" height="22" rx="11" fill="#0d47a1"/>
  <text x="780" y="460" text-anchor="middle" fill="#90caf9" font-size="9" font-weight="700">🔍 Filesystem</text>
  <text x="780" y="475" text-anchor="middle" fill="#6e7681" font-size="8">always accurate</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ═══ COLUMN 3: READ / QUERY             ═══ -->
  <!-- ═══════════════════════════════════════════ -->

  <!-- MkDocs Site -->
  <rect x="900" y="172" width="260" height="56" rx="10" fill="#2e7d32" filter="url(#sh)"/>
  <text x="1030" y="196" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🌐 MkDocs Material Site</text>
  <text x="1030" y="214" text-anchor="middle" fill="#c8e6c9" font-size="10">Search, dark mode, live Mermaid diagrams</text>

  <!-- Q&A Agent -->
  <rect x="900" y="240" width="260" height="56" rx="10" fill="#388e3c" filter="url(#sh)"/>
  <text x="1030" y="264" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">💬 Chat Q&amp;A Agent</text>
  <text x="1030" y="282" text-anchor="middle" fill="#c8e6c9" font-size="10">Complex queries → answers filed back</text>

  <!-- Spaced Repetition -->
  <rect x="900" y="308" width="260" height="56" rx="10" fill="#1b5e20" filter="url(#sh)"/>
  <text x="1030" y="332" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🔄 Spaced Repetition</text>
  <text x="1030" y="350" text-anchor="middle" fill="#a5d6a7" font-size="10">Day 1 → 3 → 7 → 14 → 30 → 90</text>

  <!-- Linting -->
  <rect x="900" y="376" width="260" height="56" rx="10" fill="#6a1b9a" filter="url(#sh)"/>
  <text x="1030" y="400" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">🧹 Monthly Lint</text>
  <text x="1030" y="418" text-anchor="middle" fill="#ce93d8" font-size="10">Contradictions, orphans, stale data, drift</text>

  <!-- ═══ CONNECTING ARROWS WITH LABELS ═══ -->
  
  <!-- Maps → MkDocs: "always" -->
  <line x1="840" y1="200" x2="895" y2="200" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="895,196 903,200 895,204" fill="#8b949e"/>
  <text x="867" y="193" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">always</text>

  <!-- Notes → Q&A: "if relevant" -->
  <line x1="840" y1="268" x2="895" y2="268" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="895,264 903,268 895,272" fill="#8b949e"/>
  <text x="867" y="261" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">if relevant</text>

  <!-- Flashcards → SRS: "scheduled" -->
  <line x1="840" y1="336" x2="895" y2="336" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="895,332 903,336 895,340" fill="#8b949e"/>
  <text x="867" y="329" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">scheduled</text>

  <!-- Cross-refs → Lint: "scan all" -->
  <line x1="840" y1="404" x2="895" y2="404" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="895,400 903,404 895,408" fill="#8b949e"/>
  <text x="867" y="397" text-anchor="middle" fill="#8b949e" font-size="9" font-style="italic">scan all</text>

  <!-- ═══ FEEDBACK LOOPS (dashed) ═══ -->
  
  <!-- Q&A → file back into wiki -->
  <path d="M1030 296 C1030 510, 727 518, 727 432" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.7"/>
  <polygon points="723,436 727,426 731,436" fill="#ff9800" opacity="0.7"/>
  
  <!-- Lint → enhance -->
  <path d="M1030 432 C1030 530, 520 540, 520 432" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.6"/>
  <polygon points="516,436 520,426 524,436" fill="#ce93d8" opacity="0.6"/>

  <!-- Feedback labels -->
  <text x="920" y="520" text-anchor="middle" fill="#ff9800" font-size="10" font-style="italic" opacity="0.8">file back into vault</text>
  <text x="700" y="545" text-anchor="middle" fill="#ce93d8" font-size="10" font-style="italic" opacity="0.7">enhance</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ═══ PHASE PIPELINE                     ═══ -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="40" y="590" fill="#484f58" font-size="11" font-style="italic">Compilation Pipeline — incremental, each step enhances the vault</text>

  <rect x="40" y="602" width="195" height="50" rx="10" fill="#e65100" filter="url(#sh)"/>
  <text x="137" y="624" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Phase 1</text>
  <text x="137" y="642" text-anchor="middle" fill="#ffcc80" font-size="10">Ingest raw data</text>

  <line x1="240" y1="627" x2="275" y2="627" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="275,623 283,627 275,631" fill="#8b949e"/>

  <rect x="288" y="602" width="195" height="50" rx="10" fill="#1565c0" filter="url(#sh)"/>
  <text x="385" y="624" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Phase 2</text>
  <text x="385" y="642" text-anchor="middle" fill="#bbdefb" font-size="10">Compile vault</text>

  <line x1="488" y1="627" x2="523" y2="627" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="523,623 531,627 523,631" fill="#8b949e"/>

  <rect x="536" y="602" width="195" height="50" rx="10" fill="#2e7d32" filter="url(#sh)"/>
  <text x="633" y="624" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Phase 3</text>
  <text x="633" y="642" text-anchor="middle" fill="#c8e6c9" font-size="10">Query &amp; revise</text>

  <line x1="736" y1="627" x2="771" y2="627" stroke="#8b949e" stroke-width="1.5"/>
  <polygon points="771,623 779,627 771,631" fill="#8b949e"/>

  <rect x="784" y="602" width="195" height="50" rx="10" fill="#6a1b9a" filter="url(#sh)"/>
  <text x="881" y="624" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Phase 4</text>
  <text x="881" y="642" text-anchor="middle" fill="#ce93d8" font-size="10">Lint &amp; maintain</text>

  <!-- Cycle arrow -->
  <path d="M881 657 C881 688, 137 688, 137 657" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="6,4" fill="none" opacity="0.5"/>
  <polygon points="133,660 137,650 141,660" fill="#8b949e" opacity="0.5"/>
  <text x="510" y="700" text-anchor="middle" fill="#6e7681" font-size="10" font-style="italic">cycle — always adding up</text>

  <!-- ═══ FUTURE ═══ -->
  <rect x="40" y="722" width="1120" height="56" rx="12" fill="#21262d" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="600" y="748" text-anchor="middle" fill="#fff" font-size="15" font-weight="700">🚀 Future: RAG Chatbot on Compiled Knowledge</text>
  <text x="600" y="768" text-anchor="middle" fill="#8b949e" font-size="11">Query your own structured, cross-referenced, synthesized notes — not raw document chunks</text>

  <!-- ═══ LEGEND ═══ -->
  <line x1="40" y1="800" x2="70" y2="800" stroke="#8b949e" stroke-width="2"/>
  <polygon points="70,797 76,800 70,803" fill="#8b949e"/>
  <text x="82" y="804" fill="#6e7681" font-size="10">Direct flow</text>

  <line x1="200" y1="800" x2="230" y2="800" stroke="#ff9800" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="230,797 236,800 230,803" fill="#ff9800"/>
  <text x="242" y="804" fill="#6e7681" font-size="10">Feedback loop — outputs enhance the vault</text>
</svg>
