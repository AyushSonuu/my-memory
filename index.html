<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 My Memory — Learning Vault</title>
    <meta name="description" content="Knowledge that sticks. Structured notes, diagrams, flashcards — all revision-ready.">
    <!-- Docsify Themes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
    <style>
        :root {
            /* Override docsify theme */
            --base-background-color: #0a0e17;
            --sidebar-background: #111827;
            --sidebar-border-color: #1e293b;
            --sidebar-name-color: #f59e0b;
            --sidebar-name-font-size: 1.4rem;
            --sidebar-nav-link-color--active: #f59e0b;
            --sidebar-nav-link-border-color--active: #f59e0b;
            --sidebar-nav-link-color--hover: #f59e0b;
            --heading-color: #f1f5f9;
            --heading-h2-color: #f59e0b;
            --base-color: #e2e8f0;
            --base-font-size: 15px;
            --theme-color: #f59e0b;
            --link-color: #f59e0b;
            --link-color--hover: #fbbf24;
            --code-inline-background: #1e293b;
            --code-inline-color: #f59e0b;
            --code-block-background: #151c2c;
            --blockquote-border-color: #f59e0b;
            --blockquote-background: rgba(245, 158, 11, 0.05);
            --table-head-background: #151c2c;
            --table-row-even-background: rgba(255, 255, 255, 0.02);
            --notice-tip-border-color: #22c55e;
            --cover-background-color: #0a0e17;
        }

        /* Custom overrides */
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

        .sidebar { 
            padding-top: 1.5rem;
            border-right: 1px solid #1e293b;
        }

        .sidebar-nav li a {
            font-size: 0.88rem;
            padding: 0.3rem 0;
        }

        .sidebar-nav li.active > a {
            border-right: 3px solid #f59e0b;
            font-weight: 600;
        }

        /* Cover page styling */
        .cover-main {
            color: #f1f5f9;
        }

        .cover-main h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f1f5f9 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cover-main blockquote p {
            color: #94a3b8;
            font-style: italic;
        }

        .cover-main .btn {
            border-color: #f59e0b;
            color: #f59e0b;
            border-radius: 8px;
            padding: 0.6rem 2rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .cover-main .btn:hover {
            background: #f59e0b;
            color: #0a0e17;
        }

        /* Table styles */
        .markdown-section table {
            border-collapse: collapse;
            width: 100%;
        }

        .markdown-section th {
            background: #151c2c;
            color: #f59e0b;
            font-weight: 600;
            font-size: 0.85rem;
            text-align: left;
        }

        .markdown-section td, .markdown-section th {
            border: 1px solid #1e293b;
            padding: 0.5rem 0.85rem;
        }

        /* Code blocks */
        .markdown-section pre {
            background: #151c2c;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 1rem 1.25rem;
        }

        .markdown-section code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.85em;
        }

        /* Blockquotes */
        .markdown-section blockquote {
            border-left: 3px solid #f59e0b;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 0 8px 8px 0;
            padding: 0.75rem 1.25rem;
            margin: 1rem 0;
        }

        /* Details / Flashcards */
        .markdown-section details {
            background: #151c2c;
            border: 1px solid #1e293b;
            border-radius: 10px;
            margin: 0.75rem 0;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .markdown-section details:hover {
            border-color: #f59e0b;
        }

        .markdown-section details summary {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .markdown-section details > p,
        .markdown-section details > table,
        .markdown-section details > blockquote {
            padding: 0 1.25rem;
        }

        /* Mermaid diagrams */
        .mermaid {
            background: #151c2c;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1rem 0;
            text-align: center;
        }

        /* Horizontal rules */
        .markdown-section hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, #1e293b, transparent);
            margin: 2rem 0;
        }

        /* Heading anchors */
        .markdown-section h2 {
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #1e293b;
        }

        /* Smooth scrolling */
        html { scroll-behavior: smooth; }

        /* Search box */
        .search input {
            background: #151c2c !important;
            border: 1px solid #1e293b !important;
            color: #f1f5f9 !important;
            border-radius: 8px !important;
        }

        .search input::placeholder {
            color: #64748b !important;
        }

        /* Navbar */
        .app-nav {
            right: 1.5rem;
        }

        .app-nav a {
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .app-nav a:hover { color: #f59e0b; }

        /* Loading */
        #app { color: #64748b; text-align: center; padding: 4rem; }
    </style>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">Loading...</div>
    <script>
        window.$docsify = {
            name: '🧠 My Memory',
            repo: 'https://github.com/AyushSonuu/my-memory',
            loadSidebar: true,
            subMaxLevel: 3,
            auto2top: true,
            coverpage: true,
            search: {
                placeholder: 'Search notes...',
                noData: 'No results found',
                depth: 3
            },
            copyCode: {
                buttonText: 'Copy',
                successText: 'Copied!'
            },
            pagination: {
                previousText: '← Previous',
                nextText: 'Next →',
                crossChapter: true,
            },
            themeColor: '#f59e0b',
            markdown: {
                renderer: {
                    code: function(code, lang) {
                        if (lang === 'mermaid') {
                            return '<div class="mermaid">' + code + '</div>';
                        }
                        return this.origin.code.apply(this, arguments);
                    }
                }
            }
        };
    </script>

    <!-- Docsify Core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- Plugins -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#151c2c',
                primaryColor: '#f59e0b',
                primaryTextColor: '#f1f5f9',
                lineColor: '#475569',
                secondaryColor: '#1e293b',
                tertiaryColor: '#0f172a'
            }
        });

        // Render mermaid after docsify loads content
        const observer = new MutationObserver(() => {
            document.querySelectorAll('.mermaid').forEach(async (el) => {
                if (el.getAttribute('data-processed')) return;
                el.setAttribute('data-processed', 'true');
                const { svg } = await mermaid.render('mermaid-' + Math.random().toString(36).substr(2, 9), el.textContent);
                el.innerHTML = svg;
            });
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
    </script>

    <!-- Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
</body>
</html>
