site_name: "🧠 My Memory"
site_description: "Every expert was once a beginner who didn't quit. Structured learning notes with diagrams, flashcards, and spaced repetition."
site_url: https://ayushsonuu.github.io/my-memory/
site_author: Ayush Sonu
repo_url: https://github.com/AyushSonuu/my-memory
repo_name: AyushSonuu/my-memory
edit_uri: ""

docs_dir: content
site_dir: docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/brain
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    # - navigation.sections  # disabled: subsections now collapsible
    # - navigation.expand  # disabled: sections now collapsible
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - header.autohide

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: "#"
  - def_list
  - footnotes

plugins:
  - search
  - mkdocs-jupyter:
      include: ["*.ipynb"]
      execute: false
      allow_errors: true
      theme: dark

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AyushSonuu
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ayush-sonu
      name: LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:sonuayush55@gmail.com
      name: Email
  generator: false

extra_css:
  - _assets/custom.css

extra_javascript:
  - _assets/mermaid-zoom.js

