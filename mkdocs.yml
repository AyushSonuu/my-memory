        - example_2.py: _generated/tech/python/asyncio/code/L1/example_2.md
        - example_3.py: _generated/tech/python/asyncio/code/L1/example_3.md
        - example_4.py: _generated/tech/python/asyncio/code/L1/example_4.md
        - example_5.py: _generated/tech/python/asyncio/code/L1/example_5.md
