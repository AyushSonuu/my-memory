<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📖 My Memory — Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg: #0a0e17;
            --surface: #151c2c;
            --border: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --accent: #f59e0b;
            --green: #22c55e;
            --blue: #3b82f6;
            --purple: #a855f7;
            --red: #ef4444;
            --code-bg: #1a1f2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }

        /* Top bar */
        .topbar {
            position: sticky;
            top: 0;
            background: rgba(10, 14, 23, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 100;
        }

        .topbar a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.15s;
        }

        .topbar a:hover { opacity: 0.8; }

        .topbar .path {
            color: var(--text-dim);
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Content area */
        .content {
            max-width: 860px;
            margin: 0 auto;
            padding: 2.5rem 2rem 4rem;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown styles */
        .content h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--border);
            letter-spacing: -0.02em;
        }

        .content h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 2.5rem;
            margin-bottom: 0.75rem;
            color: var(--accent);
        }

        .content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }

        .content h4 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.4rem;
            color: var(--text-muted);
        }

        .content p {
            margin-bottom: 1rem;
        }

        .content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.15s;
        }

        .content a:hover { border-bottom-color: var(--accent); }

        .content strong { color: var(--text); font-weight: 700; }

        .content em { color: var(--text-muted); }

        /* Blockquotes */
        .content blockquote {
            border-left: 3px solid var(--accent);
            background: rgba(245, 158, 11, 0.05);
            padding: 0.75rem 1.25rem;
            margin: 1rem 0;
            border-radius: 0 8px 8px 0;
            color: var(--text-muted);
        }

        .content blockquote p { margin-bottom: 0.4rem; }
        .content blockquote p:last-child { margin-bottom: 0; }

        /* Tables */
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        .content th {
            background: var(--surface);
            padding: 0.6rem 1rem;
            text-align: left;
            font-weight: 600;
            border: 1px solid var(--border);
            color: var(--accent);
            font-size: 0.85rem;
        }

        .content td {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
        }

        .content tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Code */
        .content code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            color: var(--accent);
        }

        .content pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            overflow-x: auto;
            margin: 1rem 0;
        }

        .content pre code {
            background: none;
            padding: 0;
            color: var(--text);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* Lists */
        .content ul, .content ol {
            padding-left: 1.5rem;
            margin-bottom: 1rem;
        }

        .content li {
            margin-bottom: 0.3rem;
        }

        /* Details (flashcard-style) */
        .content details {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0;
            margin: 0.75rem 0;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .content details:hover { border-color: var(--accent); }

        .content details[open] {
            border-color: var(--accent);
        }

        .content details summary {
            padding: 0.75rem 1.25rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            user-select: none;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .content details summary::before {
            content: '▸';
            transition: transform 0.2s;
            color: var(--accent);
        }

        .content details[open] summary::before { transform: rotate(90deg); }

        .content details > *:not(summary) {
            padding: 0 1.25rem;
        }

        .content details > *:last-child {
            padding-bottom: 1rem;
        }

        /* Horizontal rule */
        .content hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 2rem 0;
        }

        /* Mermaid diagrams */
        .mermaid {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.25rem 0;
            text-align: center;
            overflow-x: auto;
        }

        /* ASCII art pre blocks */
        .content pre:has(code:not([class])) {
            background: var(--surface);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-dim);
        }

        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--red);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .content { padding: 1.5rem 1rem 3rem; }
            .content h1 { font-size: 1.6rem; }
            .content h2 { font-size: 1.25rem; }
            .content table { font-size: 0.8rem; }
            .content th, .content td { padding: 0.4rem 0.6rem; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <a href="index.html">🧠 Home</a>
        <span class="path" id="file-path"></span>
    </div>

    <div class="content" id="content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script>
        // Initialize mermaid with dark theme
        mermaid.initialize({
            startOnLoad: false,
            theme: 'dark',
            themeVariables: {
                darkMode: true,
                background: '#151c2c',
                primaryColor: '#f59e0b',
                primaryTextColor: '#f1f5f9',
                lineColor: '#475569',
                secondaryColor: '#1e293b',
                tertiaryColor: '#0f172a'
            }
        });

        // Custom renderer for mermaid
        const renderer = new marked.Renderer();

        renderer.code = function(code, language) {
            // Handle both old and new marked API
            let text, lang;
            if (typeof code === 'object') {
                text = code.text;
                lang = code.lang;
            } else {
                text = code;
                lang = language;
            }

            if (lang === 'mermaid') {
                return `<div class="mermaid">${text}</div>`;
            }
            const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return `<pre><code class="language-${lang || ''}">${escaped}</code></pre>`;
        };

        marked.setOptions({
            renderer: renderer,
            gfm: true,
            breaks: false
        });

        // Get file path from URL
        const params = new URLSearchParams(window.location.search);
        let filePath = params.get('path') || params.get('file') || '';

        // Show file path in topbar
        document.getElementById('file-path').textContent = filePath;

        // Update page title
        if (filePath) {
            const name = filePath.split('/').pop().replace('.md', '').replace(/-/g, ' ');
            document.title = `📖 ${name} — My Memory`;
        }

        // Fetch and render
        async function loadMarkdown() {
            if (!filePath) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h2>No file specified</h2>
                        <p>Use <code>?path=tech/agent-memory/01-introduction.md</code></p>
                        <p><a href="index.html">← Back to Home</a></p>
                    </div>`;
                return;
            }

            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
                const md = await response.text();

                // Rewrite .md links to go through viewer
                const rewrittenMd = md.replace(
                    /\[([^\]]+)\]\(([^)]+\.md)\)/g,
                    (match, text, href) => {
                        // Handle relative paths
                        if (href.startsWith('http')) return match;
                        const dir = filePath.substring(0, filePath.lastIndexOf('/') + 1);
                        let resolved = href;
                        if (!href.startsWith('/') && !href.startsWith('tech/') && !href.startsWith('_')) {
                            resolved = dir + href;
                        }
                        // Normalize ../ paths
                        const parts = resolved.split('/');
                        const normalized = [];
                        for (const p of parts) {
                            if (p === '..') normalized.pop();
                            else if (p !== '.') normalized.push(p);
                        }
                        resolved = normalized.join('/');
                        return `[${text}](viewer.html?path=${encodeURIComponent(resolved)})`;
                    }
                );

                document.getElementById('content').innerHTML = marked.parse(rewrittenMd);

                // Render mermaid diagrams
                await mermaid.run({ querySelector: '.mermaid' });

            } catch (err) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h2>Failed to load file</h2>
                        <p><code>${filePath}</code></p>
                        <p>${err.message}</p>
                        <p><a href="index.html">← Back to Home</a></p>
                    </div>`;
            }
        }

        loadMarkdown();
    </script>
</body>
</html>
