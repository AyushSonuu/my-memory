name: flashcard-quiz
version: 1.0.0
description: Interactive CLI quiz from any topic's flashcards.md. Parses vault flashcard format, randomizes questions, tracks score.
runtime: python
entrypoint: run.py
python_version: ">=3.10"

inputs:
  - name: topic
    type: string
    required: true
    description: "Topic folder name (e.g., 'agent-memory') or path relative to tech/"
  - name: count
    type: integer
    required: false
    default: 10
    description: Number of questions to ask (0 = all)
  - name: mode
    type: string
    required: false
    default: random
    enum: [random, sequential, reverse]
    description: Question selection order
  - name: show-hint
    type: boolean
    required: false
    default: false
    description: Show lesson source as hint before answering

outputs:
  - name: score
    type: object
    description: "{ correct: int, total: int, percentage: float, missed: list[str] }"

dependencies: []
tags: [revision, flashcards, quiz, learning]
created: 2026-04-07
updated: 2026-04-07
author: ayra
status: stable
